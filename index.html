  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --surface2: #1f1f1f;
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.14);
      --text:     #f0ece4;
      --muted:    #888;
      --accent:   #d4a84b;
      --accent2:  #e8c97a;
      --tag-bg:   rgba(212,168,75,0.12);
      --tag-text: #d4a84b;
      --radius:   10px;
      --radius-lg:16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 3.5rem 1.5rem 2.5rem;
      position: relative;
      z-index: 1;
    }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 0.75rem; }
    .logo svg { color: var(--accent); flex-shrink: 0; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.1;
    }

    h1 em { font-style: italic; color: var(--accent); }
    .tagline { font-size: 20px; color: var(--muted); margin-top: 0.5rem; font-weight: 300; }

    main {
      width: 100%;
      max-width: 800px;
      padding: 0 1.5rem 4rem;
      position: relative;
      z-index: 1;
    }

    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .autocomplete-wrap { position: relative; }

    .autocomplete-wrap input {
      width: 100%;
      height: 44px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .autocomplete-wrap input::placeholder { color: var(--muted); }
    .autocomplete-wrap input:focus { border-color: var(--accent); }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .dropdown.open { display: block; }

    .dropdown-item {
      padding: 10px 14px;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s;
    }

    .dropdown-item:hover, .dropdown-item.highlighted {
      background: rgba(212,168,75,0.1);
      color: var(--accent);
    }

    .dropdown-item mark {
      background: none;
      color: var(--accent);
      font-weight: 500;
    }

    .tags-area {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 1rem;
      min-height: 36px;
      align-items: flex-start;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--tag-bg);
      border: 1px solid rgba(212,168,75,0.2);
      color: var(--tag-text);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 15px;
      font-weight: 400;
      animation: tagIn 0.15s ease;
    }

    @keyframes tagIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .tag button {
      background: none;
      border: none;
      color: rgba(212,168,75,0.5);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      transition: color 0.1s;
    }

    .tag button:hover { color: var(--accent); }
    .hint-text { font-size: 15px; color: var(--muted); align-self: center; }

    .options-row { display: flex; gap: 12px; margin-bottom: 1rem; flex-wrap: wrap; }

    .opt {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .opt .section-label { margin-bottom: 0.5rem; }

    .seg {
      display: flex;
      background: var(--surface2);
      border-radius: 6px;
      padding: 2px;
      gap: 2px;
    }

    .seg button {
      flex: 1;
      height: 30px;
      background: none;
      border: none;
      border-radius: 5px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      padding: 0 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 400px) {
      .seg button { font-size: 11px; padding: 0 4px; }
      .options-row { flex-direction: column; }
      .opt { min-width: unset; }
    }

    .seg button.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border2);
    }

    .btn-generate {
      width: 100%;
      height: 52px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-generate:hover { border-color: var(--accent); background: rgba(212,168,75,0.05); }
    .btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }

    .loading { text-align: center; padding: 3rem 0; }
    .shaker { display: inline-block; font-size: 2rem; animation: shake 0.5s infinite alternate; }
    @keyframes shake { from { transform: rotate(-15deg); } to { transform: rotate(15deg); } }
    .loading p { margin-top: 1rem; color: var(--muted); font-size: 16px; }

    .drinks { display: flex; flex-direction: column; gap: 12px; }

    .drink-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      animation: cardIn 0.3s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .drink-top {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .drink-thumb {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .drink-thumb-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      background: var(--surface2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .drink-meta { flex: 1; min-width: 0; }

    .drink-row1 {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.3rem;
      gap: 8px;
    }

    .drink-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.38rem;
      font-weight: 400;
      color: var(--text);
    }

    .badges { display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 0; }

    .badge {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 999px;
    }

    .badge-alc { background: rgba(212,168,75,0.12); color: var(--accent); border: 1px solid rgba(212,168,75,0.2); }
    .badge-non { background: rgba(74,185,130,0.1); color: #4ab982; border: 1px solid rgba(74,185,130,0.2); }
    .badge-cat { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

    .drink-glass { font-size: 14px; color: var(--muted); margin-bottom: 0.3rem; }

    .drink-body { display: grid; grid-template-columns: 1fr 1fr; }

    @media (max-width: 520px) { .drink-body { grid-template-columns: 1fr; } }

    .drink-section { padding: 1rem 1.5rem; }
    .drink-section + .drink-section { border-left: 1px solid var(--border); }

    @media (max-width: 520px) {
      .drink-section + .drink-section { border-left: none; border-top: 1px solid var(--border); }
    }

    .drink-section .section-label { margin-bottom: 0.5rem; }

    .drink-ingr-list { list-style: none; font-size: 15px; color: var(--text); line-height: 1.9; }
    .drink-ingr-list li::before { content: '—'; color: var(--accent); margin-right: 6px; font-size: 13px; }
    .drink-ingr-list li.missing { color: var(--muted); }
    .drink-ingr-list li.missing::before { color: #555; }

    .drink-recipe-text { font-size: 15px; color: var(--text); line-height: 1.8; }

    .match-info {
      padding: 0.6rem 1.5rem;
      font-size: 14px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }

    .match-info span { color: var(--accent); }

    .no-results {
      text-align: center;
      padding: 3rem 0;
      color: var(--muted);
      font-size: 16px;
    }

    .no-results strong { display: block; font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; font-weight: 400; }

    .error { text-align: center; padding: 2rem; color: #e07070; font-size: 16px; }

    footer {
      width: 100%;
      max-width: 800px;
      padding: 0 1.5rem 2rem;
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.2);
      position: relative;
      z-index: 1;
    }

    footer a { color: rgba(212,168,75,0.4); text-decoration: none; }
    footer a:hover { color: var(--accent); }


    .lang-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      z-index: 999;
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 2px;
      gap: 2px;
    }
    .lang-toggle button {
      height: 28px;
      padding: 0 12px;
      background: none;
      border: none;
      border-radius: 999px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .lang-toggle button.active {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--border2);
    }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>

    input.value = '';
    closeDropdown();
    renderTags();
    input.focus();
  }

  function removeTag(name) {
    selected.delete(name);
    selectedLabels.delete(name);
    renderTags();
  }

  function renderTags() {
    const container = document.getElementById('tags');
    container.innerHTML = '';
    if (selected.size === 0) {
      container.innerHTML = '<span class="hint-text">Inga ingredienser valda än.</span>';
      return;
    }
    selected.forEach(t => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      const safe = t.replace(/'/g, "\\'");
      tag.innerHTML = `${t} <button onclick="removeTag('${safe}')" title="Ta bort">×</button>`;
      container.appendChild(tag);
    });
  }

  function selectSeg(btn, segId) {
    document.querySelectorAll('#' + segId + ' button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (segId === 'type-seg') drinkType = btn.dataset.val;
    if (segId === 'match-seg') matchMode = btn.dataset.val;
  }

  async function search() {
    if (selected.size === 0) { alert(t('alertIngr')); return; }

    const btn = document.getElementById('gen-btn');
    const result = document.getElementById('result');
    btn.disabled = true;
    result.innerHTML = `<div class="loading"><div class="shaker">🍸</div><p>${t('loading')}</p></div>`;

    try {
      // Fetch drinks for each ingredient
      const ingredientList = [...selected];
      const promises = ingredientList.map(ing =>
        fetch(`https://www.thecocktaildb.com/api/json/v1/1/filter.php?i=${encodeURIComponent(ing)}`)
          .then(r => r.json())
          .then(d => ({ ing, drinks: Array.isArray(d.drinks) ? d.drinks : [] }))
          .catch(() => ({ ing, drinks: [] }))
      );

      const results = await Promise.all(promises);

      // Count matches per drink
      const drinkMap = {};
      results.forEach(({ ing, drinks }) => {
        drinks.forEach(d => {
          if (!drinkMap[d.idDrink]) {
            drinkMap[d.idDrink] = { id: d.idDrink, name: d.strDrink, thumb: d.strDrinkThumb, matched: new Set() };
          }
          drinkMap[d.idDrink].matched.add(ing);
        });
      });

      // Filter by match mode
      let matches = Object.values(drinkMap).filter(d =>
        matchMode === 'all' ? d.matched.size === ingredientList.length : d.matched.size >= 1
      );

      // Sort by number of matched ingredients descending
      matches.sort((a, b) => b.matched.size - a.matched.size);

      // Limit to top 12
      matches = matches.slice(0, 12);

      if (matches.length === 0) {
        result.innerHTML = `<div class="no-results"><strong>Inga drinkar hittades</strong>Prova färre ingredienser eller byt till "Någon" som matchning.</div>`;
        btn.disabled = false;
        return;
      }

      // Fetch full details for each drink
      const detailPromises = matches.map(m =>
        fetch(`https://www.thecocktaildb.com/api/json/v1/1/lookup.php?i=${m.id}`)
          .then(r => r.json())
          .then(d => d.drinks ? d.drinks[0] : null)
      );

      const details = (await Promise.all(detailPromises)).filter(Boolean);

      // Filter by alcohol type
      let filtered = details;
      if (drinkType !== 'alla') {
        filtered = details.filter(d => d.strAlcoholic === drinkType);
      }

      if (filtered.length === 0) {
        result.innerHTML = `<div class="no-results"><strong>Inga matchningar</strong>Prova att ändra filtret till "Alla".</div>`;
        btn.disabled = false;
        return;
      }

      result.innerHTML = `<div class="loading"><div class="shaker">🌐</div><p>${t('translating')}</p></div>`;
      const translated = (lang === 'sv' || lang === 'ro') ? await translateDrinks(filtered) : filtered;
      renderDrinks(translated, ingredientList);
    } catch(e) {
      result.innerHTML = `<div class="error">Något gick fel, försök igen.</div>`;
    }

    btn.disabled = false;
  }

  // Translate text via MyMemory (free, no key needed)
  async function translateText(text) {
    if (!text || text.length < 5) return text;
    try {
      const targetLang = lang === 'ro' ? 'ro' : 'sv'; const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=en|' + targetLang;
      const res = await fetch(url);
      const data = await res.json();
      if (data.responseStatus === 200 && data.responseData?.translatedText) {
        return data.responseData.translatedText;
      }
    } catch(e) {}
    return text;
  }

  async function translateDrinks(drinks) {
    return await Promise.all(drinks.map(async d => {
      const translated = Object.assign({}, d);
      translated.strInstructions = await translateText(d.strInstructions);
      return translated;
    }));
  }

  function renderDrinks(drinks, myIngredients) {
    const result = document.getElementById('result');
    const myLower = myIngredients.map(i => i.toLowerCase());

    result.innerHTML = '<div class="drinks">' + drinks.map((d, idx) => {
      // Build ingredient list
      const ingrs = [];
      for (let i = 1; i <= 15; i++) {
        const ing = d[`strIngredient${i}`];
        const msr = d[`strMeasure${i}`];
        if (!ing) break;
        const have = myLower.some(m => ing.toLowerCase().includes(m) || m.includes(ing.toLowerCase()));
        ingrs.push({ ing, msr, have });
      }

      const haveCount = ingrs.filter(i => i.have).length;
      const totalCount = ingrs.length;

      const isAlc = d.strAlcoholic === 'Alcoholic';

      return `
      <div class="drink-card" style="animation-delay:${idx * 0.06}s">
        <div class="drink-top">
          ${d.strDrinkThumb
            ? `<img class="drink-thumb" src="${d.strDrinkThumb}/preview" alt="${d.strDrink}" loading="lazy" />`
            : `<div class="drink-thumb-placeholder">🍹</div>`}
          <div class="drink-meta">
            <div class="drink-row1">
              <div class="drink-name">${d.strDrink}</div>
              <div class="badges">
                <span class="badge ${isAlc ? 'badge-alc' : 'badge-non'}">${isAlc ? t('alcohol') : t('nonAlcohol')}</span>
                ${d.strCategory ? `<span class="badge badge-cat">${d.strCategory}</span>` : ''}
              </div>
            </div>
            ${d.strGlass ? `<div class="drink-glass">${t('glass')}: ${d.strGlass}</div>` : ''}
          </div>
        </div>
        <div class="drink-body">
          <div class="drink-section">
            ${t('ingredients')}
            <ul class="drink-ingr-list">
              ${ingrs.map(i => `
                <li class="${i.have ? '' : 'missing'}">
                  ${i.msr ? i.msr.trim() + ' ' : ''}${i.ing}${!i.have ? ' ✗' : ''}
                </li>`).join('')}
            </ul>
          </div>
          <div class="drink-section">
            ${t('instructions')}
            <p class="drink-recipe-text">${d.strInstructions || t('noInstructions')}</p>
          </div>
        </div>
        <div class="match-info">
          ${t('youHave')} <span>${haveCount} ${t('of')} ${totalCount}</span>
        </div>
      </div>`;
    }).join('') + '</div>';
  }
  // ── i18n ──────────────────────────────────────────────
  const i18n = {
    sv: {
      tagline: 'Skriv in vad du har hemma — vi blandar resten.',
      labelIngr: 'Dina ingredienser',
      placeholder: 'Börja skriva en ingrediens eller ett varumärke…',
      hintText: 'Inga ingredienser valda än.',
      labelShow: 'Visa', btnAlla: 'Alla', btnAlc: 'Alkohol', btnNonalc: 'Alkoholfria',
      labelMatch: 'Matchning', btnAny: 'Någon', btnAll: 'Alla',
      btnGenerate: 'Hitta drinkar', footerText: 'Ingen inloggning krävs',
      loading: 'Letar i receptbasen…', translating: 'Översätter recept…',
      noResults: 'Inga drinkar hittades',

      youHave: 'Du har', of: 'av', ingredients: 'Ingredienser', instructions: 'Gör så här',
      glass: 'Glas', alcohol: 'Alkohol', nonAlcohol: 'Alkoholfri',

      placeholder: 'Start typing an ingredient or brand…',

      labelShow: 'Show', btnAlla: 'All', btnAlc: 'Alcoholic', btnNonalc: 'Non-alcoholic',
      labelMatch: 'Match', btnAny: 'Any', btnAll: 'All',
      btnGenerate: 'Find drinks', footerText: 'No login required',
      loading: 'Searching recipes…', translating: 'Loading drinks…',
      noResults: 'No drinks found',
      noResultsHint: 'Try fewer ingredients or switch to "Any" matching.',
      noMatch: 'No matches', noMatchHint: 'Try changing the filter to "All".',
      youHave: 'You have', of: 'of', ingredients: 'Ingredients', instructions: 'How to make it',
      glass: 'Glass', alcohol: 'Alcoholic', nonAlcohol: 'Non-alcoholic',
      noInstructions: 'No instructions available.',
      error: 'Something went wrong, please try again.', alertIngr: 'Select at least one ingredient!',
    },
    ro: {
      tagline: 'Introdu ce ai acasă — noi facem cocktailul.',

      hintText: 'Niciun ingredient selectat.',
      labelShow: 'Arată', btnAlla: 'Toate', btnAlc: 'Alcoolice', btnNonalc: 'Fără alcool',
      labelMatch: 'Potrivire', btnAny: 'Oricare', btnAll: 'Toate',
      btnGenerate: 'Găsește băuturi', footerText: 'Nu este necesară autentificarea',
      loading: 'Caut rețete…', translating: 'Traduc rețete…',
      noResults: 'Nu s-au găsit băuturi',
      noResultsHint: 'Încearcă mai puține ingrediente sau schimbă la potrivire "Oricare".',
      noMatch: 'Nicio potrivire', noMatchHint: 'Încearcă să schimbi filtrul la "Toate".',
      youHave: 'Ai', of: 'din', ingredients: 'Ingrediente', instructions: 'Cum se prepară',
      glass: 'Pahar', alcohol: 'Alcoolic', nonAlcohol: 'Fără alcool',
      noInstructions: 'Nu există instrucțiuni disponibile.',
      error: 'Ceva a mers greșit, încearcă din nou.', alertIngr: 'Selectează cel puțin un ingredient!',
    }
  };

  let lang = localStorage.getItem('revben_lang') || 'sv';

  function t(key) { return (i18n[lang] && i18n[lang][key]) || i18n.sv[key] || key; }

  function applyLang() {
    const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
    const q = document.querySelector.bind(document);
    const tagline = q('.tagline'); if (tagline) tagline.textContent = t('tagline');
    set('label-ingr', t('labelIngr'));
    const inp = document.getElementById('ingr-input'); if (inp) inp.placeholder = t('placeholder');
    set('hint-text', t('hintText'));
    set('label-show', t('labelShow'));
    set('btn-alla', t('btnAlla'));
    set('btn-alc', t('btnAlc'));
    set('btn-nonalc', t('btnNonalc'));
    set('label-match', t('labelMatch'));
    set('btn-any', t('btnAny'));
    set('btn-all', t('btnAll'));
    set('btn-generate-text', t('btnGenerate'));
    set('footer-text', t('footerText'));
  }

  function setLang(l) {
    lang = l;
    localStorage.setItem('revben_lang', l);
    ['sv','en','ro'].forEach(code => {
      const b = document.getElementById('btn-' + code);
      if (b) b.classList.toggle('active', code === l);
    });
    document.querySelector('html').lang = l;
    applyLang();
  }

  // Init on load
  document.addEventListener('DOMContentLoaded', () => setLang(lang));
