    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#d4a84b" stroke-width="2" stroke-opacity="0.2"/>

  <!-- Decorative corner lines -->
  <line x1="40" y1="40" x2="120" y2="40" stroke="#d4a84b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="40" y1="40" x2="40" y2="120" stroke="#d4a84b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1160" y1="40" x2="1080" y2="40" stroke="#d4a84b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1160" y1="40" x2="1160" y2="120" stroke="#d4a84b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="40" y1="590" x2="120" y2="590" stroke="#d4a84b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="40" y1="590" x2="40" y2="510" stroke="#d4a84b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1160" y1="590" x2="1080" y2="590" stroke="#d4a84b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1160" y1="590" x2="1160" y2="510" stroke="#d4a84b" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Glass icon -->
